<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signing you in...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4ff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }

    .icon {
      width: 64px; height: 64px;
      border-radius: 16px;
      background: #1A56A0;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 32px; height: 32px; fill: white; }

    h1 { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 10px; }
    .subtitle { font-size: 15px; color: #888; line-height: 1.5; margin-bottom: 32px; }

    .status {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; font-size: 14px; color: #1A56A0; font-weight: 500; min-height: 28px;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #d0dff5; border-top-color: #1A56A0;
      border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .download-section { display: none; margin-top: 28px; }
    .download-label { font-size: 13px; color: #aaa; margin-bottom: 16px; }
    .store-buttons { display: flex; flex-direction: column; gap: 12px; }

    .store-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 14px 20px; border-radius: 12px;
      border: none; cursor: pointer; font-size: 15px; font-weight: 600;
      text-decoration: none; transition: opacity 0.2s;
    }
    .store-btn:hover { opacity: 0.85; }
    .store-btn svg { width: 22px; height: 22px; flex-shrink: 0; }
    .btn-appstore  { background: #000; color: #fff; }
    .btn-playstore { background: #01875f; color: #fff; }

    .try-again {
      margin-top: 16px; font-size: 13px; color: #1A56A0;
      cursor: pointer; text-decoration: underline;
      background: none; border: none;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
  </div>
  <h1>Armbrok</h1>
  <p class="subtitle">Opening the app to complete<br/>your sign-in…</p>

  <div class="status" id="status">
    <div class="spinner"></div>
    <span>Redirecting to app…</span>
  </div>

  <div class="download-section" id="downloadSection">
    <p class="download-label">Don't have the app yet? Download it here:</p>
    <div class="store-buttons">
      <a class="store-btn btn-appstore" id="appStoreBtn" href="#" target="_blank">
        <svg viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        App Store
      </a>
      <a class="store-btn btn-playstore" id="playStoreBtn" href="#" target="_blank">
        <svg viewBox="0 0 24 24" fill="white"><path d="M3.18 23.76c.3.17.64.22.99.14l.11-.07 11.29-6.52-2.43-2.44-9.96 8.89zm-1.1-20.69A1.5 1.5 0 0 0 2 4v16a1.5 1.5 0 0 0 .08.52l9.26-8.28-9.26-9.17zm19.4 8.42-2.56-1.48-2.72 2.43 2.72 2.73 2.59-1.5c.74-.43.74-1.74-.03-2.18zm-16.84 9.3 9.96-5.75-2.43-2.44-7.53 8.19z"/></svg>
        Google Play
      </a>
    </div>
    <button class="try-again" id="tryAgain">Already installed? Try opening again</button>
  </div>
</div>

<script>
  // ─── FILL IN YOUR URLS ───────────────────────────────────────────────────────
  const UNIVERSAL_LINK_DOMAIN = "umbrellait-zafar-abdulloev.github.io"; // your domain with apple-app-site-association
  const APP_STORE_URL         = "YOUR_APP_STORE_URL";   // https://apps.apple.com/app/idXXXXXX
  const PLAY_STORE_URL        = "YOUR_PLAY_STORE_URL";  // https://play.google.com/store/apps/details?id=com.armbrok.app
  // ─────────────────────────────────────────────────────────────────────────────

  document.getElementById("appStoreBtn").href  = APP_STORE_URL;
  document.getElementById("playStoreBtn").href = PLAY_STORE_URL;

  const statusEl        = document.getElementById("status");
  const downloadSection = document.getElementById("downloadSection");

  function openApp() {
    const continueUrl = window.location.href;
    const universalLink = `https://${UNIVERSAL_LINK_DOMAIN}/auth/action?link=${encodeURIComponent(continueUrl)}`;
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

    if (isSafari) {
      // Already in Safari — Universal Link fires normally
      window.location.href = universalLink;
    } else {
      // Chrome / Gmail / any WKWebView — force open in Safari first,
      // Safari will then intercept the Universal Link and open the app
      window.location.href = `x-safari-${universalLink}`;
    }
  }

  function showDownload() {
    statusEl.innerHTML = `<span style="color:#C0392B">App not detected on this device.</span>`;
    downloadSection.style.display = "block";
  }

  // Safari blocks programmatic custom scheme redirects on page load.
  // Must be triggered by a user gesture (tap).
  statusEl.innerHTML = `<span>Tap below to open the app</span>`;
  downloadSection.style.display = "block";

  const tryAgainBtn = document.getElementById("tryAgain");
  tryAgainBtn.textContent = "Open Armbrok App";
  tryAgainBtn.style.cssText = `
    margin-top: 16px;
    padding: 14px 28px;
    background: #1A56A0;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    text-decoration: none;
  `;

  tryAgainBtn.onclick = () => {
    openApp(); // safe — inside click handler
    setTimeout(() => {
      if (!document.hidden) {
        // Still here → app not installed, show store buttons
        statusEl.innerHTML = `<span style="color:#C0392B">App not detected on this device.</span>`;
        tryAgainBtn.textContent = "Try Again";
        tryAgainBtn.style.background = "none";
        tryAgainBtn.style.color = "#1A56A0";
        tryAgainBtn.style.padding = "0";
        tryAgainBtn.style.fontSize = "13px";
        tryAgainBtn.style.textDecoration = "underline";
      }
    }, 2000);
  };
</script>
</body>
</html>
